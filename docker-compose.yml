services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://analytics:analytics@db:5432/bitrix_analytics
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: bitrix_analytics
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
